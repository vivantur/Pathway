name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bot:
    name: Bot syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check - bot entry points
        run: |
          node --check apps/bot/src/index.js
          node --check apps/bot/src/deploy.js

      - name: Syntax check - bot source
        shell: bash
        run: |
          find apps/bot/src -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Syntax check - bot scripts
        shell: bash
        run: |
          find apps/bot/supabase apps/bot/tools -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f"
          done

  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Typecheck web
        run: npm --workspace apps/web run typecheck

      - name: Lint web
        run: npm --workspace apps/web run lint

      - name: Build web
        run: npm --workspace apps/web run build

  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Test core
        run: npm --workspace packages/core run test
