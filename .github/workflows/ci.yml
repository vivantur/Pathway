name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Pathwayv2 syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check - Pathwayv2 entry points
        run: |
          node --check Pathwayv2/src/index.js
          node --check Pathwayv2/src/deploy.js

      - name: Syntax check - Pathwayv2 source
        shell: bash
        run: |
          find Pathwayv2/src -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Syntax check - Pathwayv2 scripts
        shell: bash
        run: |
          find Pathwayv2/supabase Pathwayv2/tools -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f"
          done
