name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Syntax & dependency check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # node --check parses the file for syntax errors without executing it.
      # This catches crashes-on-startup without needing a running bot or Discord token.
      - name: Syntax check — index.js
        run: node --check index.js

      - name: Syntax check — deploy.js
        run: node --check deploy.js

      - name: Syntax check — systems/
        run: |
          for f in systems/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Syntax check — commands/
        run: |
          for f in commands/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Syntax check — utils/
        run: |
          for f in utils/*.js; do
            echo "Checking $f"
            node --check "$f"
          done
