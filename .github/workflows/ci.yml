name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Node 20 reached end-of-life on 2026-04-30, and @supabase/supabase-js (used by
# both apps) declares `engines.node >= 22`. Keep all jobs on 22 LTS.

jobs:
  bot:
    name: Bot syntax check + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Syntax check - bot entry points
        run: |
          node --check apps/bot/src/index.js
          node --check apps/bot/src/deploy.js

      - name: Syntax check - bot source
        shell: bash
        run: |
          find apps/bot/src -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Syntax check - bot scripts
        shell: bash
        run: |
          find apps/bot/supabase apps/bot/tools apps/bot/scripts -name '*.js' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            node --check "$f"
          done

      # `node --check` only parses — it accepts a call to an identifier that was
      # never defined. In ~39k lines of untyped CommonJS that is how two real
      # bugs shipped (a deleted legacy `getEncounter`, and a `makeCombatant` that
      # fell out of scope in the Supabase restore path). One rule: no-undef.
      - name: Lint bot (no-undef)
        run: npm --workspace apps/bot run lint

      # The bot's Vitest suite locks the pure rules layer: dice/degree-of-success,
      # MAP, proficiency math, the /roll parser, conditions, spell heightening,
      # the dying/wounded/recovery engine, and combat v2. This is the game math
      # that ruins a session when it silently drifts.
      - name: Test bot
        run: npm --workspace apps/bot run test

  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Typecheck web
        run: npm --workspace apps/web run typecheck

      - name: Lint web
        run: npm --workspace apps/web run lint

      # Covers what the builder SERIALIZES. Values that consumers cannot recompute
      # from the saved JSON (AC, notably) must be written into it, or in-house
      # characters silently lose stats the moment they leave the builder.
      - name: Test web
        run: npm --workspace apps/web run test

      - name: Build web
        run: npm --workspace apps/web run build

  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` runs core's `prepare` script, which builds dist/. The web build
      # and the bot both consume that output, so a failure here is a deploy
      # failure — keep it as its own step rather than an implicit side effect.
      - name: Install workspaces (builds core via prepare)
        run: npm ci

      - name: Verify core built
        run: node -e "require('node:fs').accessSync('packages/core/dist/index.js')"

      - name: Typecheck core
        run: npm --workspace packages/core run typecheck

      - name: Test core
        run: npm --workspace packages/core run test

      # The bot is CommonJS and consumes core through require(). Node >= 22.12
      # can require() an ESM module; this proves the packaging still allows it,
      # so the bot migration never gets blocked by a silent packaging change.
      - name: Verify CommonJS can require core
        run: node -e "const c=require('@pathway/core'); if(c.abilityModifier(18)!==4) throw new Error('core require() broken'); console.log('require(@pathway/core) ok');"
