<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply the stored theme before first paint so there's no flash of the
         wrong palette. Defaults to dark when nothing is stored. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('pathway-theme');
          var light = t === 'light';
          document.documentElement.classList.toggle('light', light);
          document.documentElement.classList.toggle('dark', !light);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pathway — the definitive digital platform for Pathfinder Second Edition."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Pathway — Pathfinder 2e</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
